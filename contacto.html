<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandwichazo - Contacto</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/d42cd7ebcb.js" crossorigin="anonymous"></script>
</head>

<body>

    <header>
        <nav>
            <div class="logo">
                <img src="imagenes/Sandwichazo.png" alt="Logo de Sandwichazo" class="logo">
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="nosotros.html">Sobre Nosotros</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section id="grid-contacto">
        <form class="formulario-grid">
            <h1>Contactanos</h1>

            <div class="field-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre">
            </div>

            <div class="field-group">
                <label for="correo">Correo:</label>
                <input type="email" id="correo">
            </div>

            <div class="field-group">
                <label for="celular">Teléfono:</label>
                <input type="text" id="celular">
            </div>

            <div class="field-group">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje"></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar</button>
        </form>

        <div class="mapa-container">
            <h2>Encuéntranos en la Avenida Independencia</h2>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3785.0174904181686!2d-69.95624532309058!3d18.43751498264007!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8ea561c28fd9cff1%3A0x5cacdabb8629eb3!2sEl%20Sandwichazo!5e0!3m2!1ses-419!2sdo!4v1773708412196!5m2!1ses-419!2sdo"
                allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>

        </div>

    </section>

    <footer>
        <p>&copy; 2026 El Sandwichazo. Todos los derechos reservados.</p>

        <div class="socials">
            <a href="#" aria-label="Twitter"><i class="fa-brands fa-twitter"></i></a>
            <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
        </div>
    </footer>


</body>

</html>
